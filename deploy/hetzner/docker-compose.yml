name: jones

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [back]

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    networks: [back]

  api:
    build:
      context: ../..
      dockerfile: deploy/hetzner/Dockerfile.prod
    image: jones-api:latest
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: api.jones.com,localhost,127.0.0.1
      SITE_URL: ${SITE_URL}
      DJANGO_BASE_URL: https://api.jones.com
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      SECURE_SSL_REDIRECT: "False"
      # GS_BUCKET_NAME intentionally NOT set — Django uses local file
      # storage at MEDIA_ROOT (/app/media) which is bind-mounted from
      # ./media-bucket/ on the host so files survive container rebuilds
      # and can be backed up trivially.
      WP_SHOP_BASE_URL: ${WP_SHOP_BASE_URL}
      WP_SHOP_WC_CONSUMER_KEY: ${WP_SHOP_WC_CONSUMER_KEY}
      WP_SHOP_WC_CONSUMER_SECRET: ${WP_SHOP_WC_CONSUMER_SECRET}
    volumes:
      - ./media-bucket:/app/media
      - static:/app/staticfiles
    networks: [back, front]

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on: [api]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/api.jones.com.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot
      - static:/var/www/static:ro
      - ./media-bucket:/var/www/media:ro
    networks: [front]

  certbot:
    image: certbot/certbot:latest
    profiles: ["tools"]
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/sh -c

volumes:
  pgdata:
  redisdata:
  static:
  certbot-etc:
  certbot-www:

networks:
  front:
  back:
