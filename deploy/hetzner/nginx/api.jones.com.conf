# vhost: api.jones.com
# This file ships in HTTP-only mode initially. After Let's Encrypt cert
# is obtained (Phase 5: bash scripts/ssl-init.sh), the conf is rewritten
# to add the HTTPS server block and 80→443 redirect.

upstream django_api {
    server api:8000;
    keepalive 16;
}

server {
    listen      80;
    listen      [::]:80;
    server_name api.jones.com _;

    # ACME HTTP-01 challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        expires 30d;
        add_header Cache-Control "public";
        # Logged (buffered in http{}) so CrowdSec can detect image scrapers.
    }

    location / {
        proxy_pass         http://django_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_redirect     off;
    }
}
