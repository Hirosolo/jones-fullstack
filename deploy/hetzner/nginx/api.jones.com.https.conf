# vhost: api.jones.com — HTTPS edition
# This file is swapped in by ssl-init.sh AFTER Let's Encrypt cert exists.
# Before that, api.jones.com.conf (HTTP-only) is in use so certbot
# can complete the ACME http-01 challenge.

upstream django_api {
    server api:8000;
    keepalive 16;
}

# HTTP → HTTPS redirect, but keep ACME challenge path live for renewal
server {
    listen      80;
    listen      [::]:80;
    server_name api.jones.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name api.jones.com;

    ssl_certificate     /etc/letsencrypt/live/__CERT_NAME__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__CERT_NAME__/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;

    # Modern SSL config (Mozilla intermediate)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (only after you've verified HTTPS works for ≥1 day)
    add_header Strict-Transport-Security "max-age=63072000" always;

    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        expires 30d;
        add_header Cache-Control "public";
        # Logged (buffered in http{}) so CrowdSec can detect image scrapers.
    }

    location / {
        proxy_pass         http://django_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_redirect     off;
    }
}
